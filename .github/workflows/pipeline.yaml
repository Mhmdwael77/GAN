name: Assignment 6 Gatekeeper Pipeline

on:
  push:

jobs:
  linter:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check .

  train:
    name: Train model
    runs-on: ubuntu-latest
    needs: linter
    if: ${{ needs.linter.result == 'success' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message || '', '[run-train]') }}
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn mlflow

      - name: Run training
        run: python train.py

      - name: Ensure error log exists on failure
        if: failure()
        run: |
          if [ ! -f error_logs.txt ]; then
            echo "Training job failed. Check workflow logs for details." > error_logs.txt
          fi

      - name: Upload error logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt
          if-no-files-found: error

      - name: Cleanup temporary cloud volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
