name: Assignment 5 Pipeline

on:
  push:
  workflow_dispatch:
    inputs:
      accuracy_threshold:
        description: "Deployment accuracy threshold"
        required: false
        default: "0.85"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dvc
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Pull data with DVC
        run: |
          if [ -f dvc.yaml ] || [ -d .dvc ] || compgen -G "*.dvc" > /dev/null; then
            dvc pull
          else
            echo "No DVC configuration found, skipping dvc pull"
          fi

      - name: Train model and log to MLflow
        run: python train.py

      - name: Verify files
        run: |
          test -f model_info.txt
          test -f mlflow.db
          echo "model_info.txt and mlflow.db exist"

      - name: Upload MLflow files
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-state
          path: |
            model_info.txt
            mlflow.db
            mlruns
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Download MLflow files
        uses: actions/download-artifact@v4
        with:
          name: mlflow-state

      - name: Verify downloaded files
        run: |
          ls -la
          test -f model_info.txt
          test -f mlflow.db

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t my-model:latest .