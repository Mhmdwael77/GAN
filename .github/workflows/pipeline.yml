name: Assignment 5 Pipeline

on:
  push:
  workflow_dispatch:
    inputs:
      accuracy_threshold:
        description: "Deployment accuracy threshold"
        required: false
        default: "0.85"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull data with DVC
        run: |
          if [ -f dvc.yaml ] || [ -d .dvc ] || compgen -G "*.dvc" > /dev/null; then
            dvc pull
          else
            echo "No DVC configuration found, skipping dvc pull"
          fi

      - name: Train model and log to MLflow
        run: python train.py

      - name: Ensure model info file exists
        run: test -f model_info.txt

      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      ACCURACY_THRESHOLD: ${{ github.event.inputs.accuracy_threshold || '0.85' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"